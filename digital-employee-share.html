  <style>
    :root {

      display: grid;
      gap: 0.48rem;
    }

    .section-note {
      color: var(--text-secondary);
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--card-gap);
    }

      border-radius: 20px;

    @media (max-width: 600px) {

  <script>
    const markdownSource = JSON.parse(document.getElementById('markdown-source').textContent);

    function stripMarkdownLinks(value) {
      return value.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1').trim();
    }

    function splitRow(line) {
      return line
        .trim()
        .replace(/^\|/, '')
        .replace(/\|$/, '')
        .split('|')
        .map((cell) => cell.trim());
    }

    function parseStandaloneLink(value) {
      const match = value.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
      if (!match) {
        return null;
      }
      return { label: match[1], href: match[2] };
    }

    function parseMarkdown(markdown) {
      const lines = markdown.split('\n');
      const sections = [];
      let currentSection = null;

      for (const line of lines) {
        if (line.startsWith('## ')) {
          currentSection = {
            title: line.slice(3).trim(),
            headers: [],
            items: [],
          };
          sections.push(currentSection);
          continue;
        }

        if (!currentSection || !line.startsWith('| ')) {
          continue;
        }

        if (line.startsWith('| ---')) {
          continue;
        }

        const row = splitRow(line);
        if (!currentSection.headers.length) {
          currentSection.headers = row;
          continue;
        }

        currentSection.items.push(row);
      }

      return sections;
    }

    function createId(index) {
      return `section-${index + 1}`;
    }

    function render() {
      const sections = parseMarkdown(markdownSource);
      const quickNav = document.getElementById('quickNav');
      const sectionsRoot = document.getElementById('sections');
      const totalAgents = sections.reduce((sum, section) => sum + section.items.length, 0);

      document.getElementById('sectionCount').textContent = `${sections.length} 个分类`;
      document.getElementById('agentCount').textContent = `${totalAgents} 个岗位`;

      sections.forEach((section, sectionIndex) => {
        const sectionId = createId(sectionIndex);
        const navLink = document.createElement('a');
        navLink.href = `#${sectionId}`;
        navLink.textContent = section.title;
        quickNav.appendChild(navLink);

        const sectionBlock = document.createElement('section');
        sectionBlock.className = 'section-block';
        sectionBlock.id = sectionId;

        const head = document.createElement('div');
        head.className = 'section-head';
        head.innerHTML = `
          <h2>${section.title}</h2>
          <p class="section-note">${section.items.length} 个岗位</p>
        `;
        sectionBlock.appendChild(head);

        const grid = document.createElement('div');
        grid.className = 'agent-grid';

        section.items.forEach((item) => {
          const card = document.createElement('article');
          card.className = 'agent-card';

          const title = document.createElement('h3');
          title.textContent = stripMarkdownLinks(item[0]);
          card.appendChild(title);

          const meta = document.createElement('dl');
          meta.className = 'agent-meta';

          section.headers.slice(1).forEach((header, index) => {
            const value = item[index + 1] || '';
            const label = stripMarkdownLinks(header);
            const pair = document.createElement('div');
            const dt = document.createElement('dt');
            const dd = document.createElement('dd');

            dt.textContent = label;
            const standaloneLink = parseStandaloneLink(value);
            if (standaloneLink) {
              const anchor = document.createElement('a');
              anchor.href = standaloneLink.href;
              anchor.target = '_blank';
              anchor.rel = 'noopener noreferrer';
              anchor.textContent = standaloneLink.label;
              dd.appendChild(anchor);
            } else {
              dd.textContent = stripMarkdownLinks(value);
            }

            pair.appendChild(dt);
            pair.appendChild(dd);
            meta.appendChild(pair);
          });

          card.appendChild(meta);
          grid.appendChild(card);
        });

        sectionBlock.appendChild(grid);
        sectionsRoot.appendChild(sectionBlock);
      });
    }

    render();
  </script>
</body>
</html>
